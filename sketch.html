<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>p5 sketch</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
    #back {
      position: fixed; top: 10px; left: 10px; z-index: 9999;
      font: 14px/1 system-ui, sans-serif;
      background: rgba(0,0,0,0.6); color: #fff;
      padding: 6px 10px; border-radius: 4px;
      text-decoration: none;
    }
    #back:hover { background: rgba(0,0,0,0.85); }
  </style>
  <script>
    // All script tags must be injected synchronously during parse via
    // document.write so they execute in order BEFORE DOMContentLoaded —
    // otherwise p5 auto-starts with no setup/draw defined and the canvas
    // stays blank. The <base> also has to come first so the sketch's
    // relative asset paths (e.g. loadSound("data/foo.mp3")) resolve to
    // its own folder.
    const _params = new URLSearchParams(location.search);
    const _folder = _params.get("folder") || "";
    const _file = _params.get("file") || "";
    if (_folder) document.write('<base href="' + encodeURI(_folder) + '/">');
    document.write('<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"><\/script>');
    document.write('<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/addons/p5.sound.min.js"><\/script>');
    if (_file) document.write('<script src="' + encodeURI(_file) + '"><\/script>');
  </script>
</head>
<body>
  <a id="back" href="../index.html">← back</a>
  <script>
    if (!new URLSearchParams(location.search).get("file")) {
      document.body.insertAdjacentHTML("beforeend",
        '<p style="color:#fff;font:16px system-ui;padding:20px">No sketch selected. Open index.html.</p>');
    }
  </script>
</body>
</html>
